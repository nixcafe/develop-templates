name: "Check Nix flake on pull requests"
on:
  pull_request:
    branches:
      - "main"
jobs:
  flake-check:
    runs-on: "ubuntu-latest"
    permissions:
      contents: "read"
    steps:
      - uses: "actions/checkout@v4"
      - uses: "DeterminateSystems/nix-installer-action@main"
        with:
          determinate: true
      - uses: "DeterminateSystems/magic-nix-cache-action@main"
      - run: "nix flake check"
